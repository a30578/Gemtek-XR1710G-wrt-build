name: Sync Plugins
run-name: Sync Custom Plugins

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'ж“ҚдҪң / Action'
        type: choice
        required: true
        default: 'clone'
        options:
          - clone
          - clear

      repo_preset:
        description: 'йҖүжӢ©йў„и®ҫд»“еә“ / Select Preset'
        type: choice
        required: true
        default: 'kenzok8/small-package'
        options:
          - 'kenzok8/small-package'
          - 'kenzok8/openwrt-packages'
          - 'fw876/helloworld'
          - 'vernesong/OpenClash'
          - 'kiddin9/op-packages'
          - 'custom'

      repo_custom:
        description: 'еҰӮжһңдёҠйқўйҖүдәҶ customпјҢеңЁжӯӨеӨ„иҫ“е…ҘиҮӘе®ҡд№үи·Ҝеҫ„ (owner/repo)'
        type: string
        required: false
        default: ''

jobs:
  determine-repo:
    runs-on: ubuntu-latest
    outputs:
      repo_path: ${{ steps.repo.outputs.repo_path }}
      repo_branch: ${{ steps.repo.outputs.repo_branch }}
    steps:
      - name: Determine Repo Path and Branch
        id: repo
        run: |
          REPO_PRESET="${{ github.event.inputs.repo_preset }}"
          REPO_CUSTOM="${{ github.event.inputs.repo_custom }}"

          if [ "$REPO_PRESET" = "custom" ]; then
            REPO_PATH="$REPO_CUSTOM"
          else
            REPO_PATH="$REPO_PRESET"
          fi
          echo "repo_path=$REPO_PATH" >> $GITHUB_OUTPUT

          # еёёз”Ёд»“еә“зҡ„й»ҳи®ӨеҲҶж”Ҝйў„е®ҡд№ү
          case "$REPO_PATH" in
            kenzok8/small-package)
              DEFAULT_BRANCH="main"
              ;;
            kenzok8/openwrt-packages)
              DEFAULT_BRANCH="master"
              ;;
            fw876/helloworld)
              DEFAULT_BRANCH="dev"
              ;;
            vernesong/OpenClash)
              DEFAULT_BRANCH="master"
              ;;
            kiddin9/op-packages)
              DEFAULT_BRANCH="main"
              ;;
            *)
              # жңӘзҹҘд»“еә“пјҢйҖҡиҝҮ API жЈҖжөӢ
              DEFAULT_BRANCH=$(curl -s "https://api.github.com/repos/$REPO_PATH" 2>/dev/null | grep -o '"default_branch": "[^"]*' | cut -d'"' -f4)
              if [ -z "$DEFAULT_BRANCH" ]; then
                DEFAULT_BRANCH="main"
              fi
              ;;
          esac

          echo "repo_branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "=== д»“еә“: $REPO_PATH"
          echo "=== еҲҶж”Ҝ: $DEFAULT_BRANCH ==="

  list-plugins:
    runs-on: ubuntu-latest
    needs: determine-repo
    outputs:
      repo_path: ${{ needs.determine-repo.outputs.repo_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List Custom Plugins
        run: |
          echo "### рҹ“Ұ Custom Plugins зӣ®еҪ•з»“жһ„" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PLUGINS=$(find apps/custom -type f -name Makefile 2>/dev/null | wc -l)
          echo "жҸ’д»¶ж•°йҮҸ: $PLUGINS" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "=== жҸ’д»¶еҲ—иЎЁ ==="
          find apps/custom -maxdepth 3 -type d 2>/dev/null | while read dir; do
            if [ -f "$dir/Makefile" ]; then
              name=$(basename "$dir")
              echo "вң… $name"
            fi
          done

          if [ -z "$(ls -A apps/custom 2>/dev/null)" ]; then
            echo "вҡ пёҸ  apps/custom зӣ®еҪ•дёәз©ә"
          fi

      - name: Show Plugin Details
        run: |
          echo ""
          echo "=== жҸ’д»¶иҜҰжғ… ==="
          for plugin in apps/custom/*/; do
            if [ -d "$plugin" ] && [ -f "$plugin/Makefile" ]; then
              name=$(basename "$plugin")
              echo ""
              echo "рҹ“Ғ $name"
              file_count=$(find "$plugin" -type f 2>/dev/null | wc -l)
              echo "   ж–Үд»¶ж•°: $file_count"
            fi
          done

  clone-plugin:
    needs: [determine-repo, list-plugins]
    if: github.event.inputs.action == 'clone'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Plugin Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.determine-repo.outputs.repo_path }}
          ref: ${{ needs.determine-repo.outputs.repo_branch }}
          path: ./tmp-plugin-repo
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Copy All Plugins to apps/custom
        run: |
          REPO_PATH="${{ needs.determine-repo.outputs.repo_path }}"
          REPO_NAME=$(basename "$REPO_PATH")

          echo "д»“еә“: $REPO_PATH"
          echo "зӣ®ж Үзӣ®еҪ•: apps/custom/$REPO_NAME"
          echo "еҪ“еүҚзӣ®еҪ•: $(pwd)"
          echo ""

          # и®Ўз®—д»“еә“дёӯжңүеӨҡе°‘дёӘ luci-app жҸ’д»¶
          PLUGIN_COUNT=$(find "./tmp-plugin-repo" -maxdepth 2 -name "Makefile" -path "*luci-app*" | wc -l)
          echo "еҸ‘зҺ° $PLUGIN_COUNT дёӘ luci-app жҸ’д»¶"

          # жҳҫзӨәжүҖжңүеҸҜз”Ёзҡ„жҸ’д»¶
          echo ""
          echo "=== еҸҜз”ЁжҸ’д»¶еҲ—иЎЁ ==="
          find "./tmp-plugin-repo" -maxdepth 2 -name "Makefile" -path "*luci-app*" -exec dirname {} \; | while read dir; do
            name=$(basename "$dir")
            echo "- ${name#luci-app-}"
          done

          # еҰӮжһңе·ІеӯҳеңЁиҜҘд»“еә“зӣ®еҪ•пјҢе…ҲеӨҮд»Ҫ
          if [ -d "apps/custom/$REPO_NAME" ]; then
            mkdir -p apps/custom.bak
            rm -rf "apps/custom.bak/$REPO_NAME"
            cp -r "apps/custom/$REPO_NAME" "apps/custom.bak/$REPO_NAME"
            echo ""
            echo "е·ІеӨҮд»Ҫж—§зүҲжң¬еҲ° apps/custom.bak/$REPO_NAME"
          fi

          # еӨҚеҲ¶ж•ҙдёӘд»“еә“еҲ° apps/custom
          mkdir -p apps/custom
          rm -rf "apps/custom/$REPO_NAME"
          cp -r "./tmp-plugin-repo" "apps/custom/$REPO_NAME"

          # еҲ йҷӨ .git зӣ®еҪ•пјҲйҒҝе…Қ embedded repository й—®йўҳпјү
          rm -rf "apps/custom/$REPO_NAME/.git"

          echo ""
          echo "=== еӨҚеҲ¶еҗҺзҡ„зӣ®еҪ•з»“жһ„ ==="
          ls -la apps/custom/

          # йӘҢиҜҒж–Үд»¶зЎ®е®һеӯҳеңЁ
          echo ""
          echo "=== йӘҢиҜҒжҸ’д»¶ж–Үд»¶ ==="
          find "apps/custom/$REPO_NAME" -type f -name "Makefile" -path "*luci-app*" | wc -l
          echo "дёӘ luci-app жҸ’д»¶е·ІеӨҚеҲ¶"

      - name: Commit and Push
        run: |
          REPO_PATH="${{ needs.determine-repo.outputs.repo_path }}"
          REPO_NAME=$(basename "$REPO_PATH")

          echo "=== Git зҠ¶жҖҒ ==="
          echo "еҪ“еүҚзӣ®еҪ•: $(pwd)"
          ls -la apps/custom/

          echo ""
          echo "=== жҺЁйҖҒеүҚеҗҢжӯҘиҝңзЁӢ ==="
          git fetch origin
          git rebase origin/main

          echo ""
          echo "=== жЈҖжҹҘ git status ==="
          git status

          echo ""
          if ! git diff --quiet apps/custom/ 2>/dev/null; then
            echo "жЈҖжөӢеҲ°еҸҳеҢ–пјҢжӯЈеңЁжҸҗдәӨ..."
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add "apps/custom/$REPO_NAME"
            git status
            git commit -m "add: $REPO_NAME plugins ($(date +%Y%m%d))"
            git push
            echo "вң… е·ІжҺЁйҖҒ: apps/custom/$REPO_NAME"
          else
            echo "ж— йңҖжҸҗдәӨ"
          fi

  clear-plugins:
    needs: [determine-repo, list-plugins]
    if: github.event.inputs.action == 'clear'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clear Specific Plugin Repo
        run: |
          REPO_PATH="${{ needs.determine-repo.outputs.repo_path }}"
          REPO_NAME=$(basename "$REPO_PATH")

          echo "=== жё…з©әд»“еә“: $REPO_NAME ==="

          # жЈҖжҹҘзӣ®еҪ•жҳҜеҗҰеӯҳеңЁ
          if [ ! -d "apps/custom/$REPO_NAME" ]; then
            echo "вҡ пёҸ  apps/custom/$REPO_NAME дёҚеӯҳеңЁпјҢи·іиҝҮ"
            echo "ж— йңҖжҸҗдәӨ"
            exit 0
          fi

          # еҲ йҷӨжҢҮе®ҡзҡ„д»“еә“зӣ®еҪ•
          rm -rf "apps/custom/$REPO_NAME"
          echo "вң… е·ІеҲ йҷӨ apps/custom/$REPO_NAME"

          echo ""
          echo "=== еү©дҪҷд»“еә“ ==="
          ls -la apps/custom/ 2>/dev/null || echo "зӣ®еҪ•дёәз©ә"

          echo ""
          echo "=== жҺЁйҖҒеүҚеҗҢжӯҘиҝңзЁӢ ==="
          git fetch origin
          git rebase origin/main

          echo ""
          echo "=== жЈҖжҹҘеҸҳеҢ– ==="
          if ! git diff --quiet apps/custom/ 2>/dev/null; then
            echo "жЈҖжөӢеҲ°еҸҳеҢ–пјҢжӯЈеңЁжҸҗдәӨ..."
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add apps/custom/
            git status
            git commit -m "chore: clear $REPO_NAME plugins"
            git push
            echo "вң… е·ІжҺЁйҖҒжё…з©әж“ҚдҪң: $REPO_NAME"
          else
            echo "ж— йңҖжҸҗдәӨ"
          fi