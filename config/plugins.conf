#!/bin/bash
# ========================================
# Gemtek XR1710G 固件编译 - 插件配置
# ========================================
#
# ⚠️  重要说明：
#    UPSTREAM 由 workflow 根据选择自动覆盖。
#    XR1710G 使用 SPI-NAND (4GB)，固件分区自动计算，无需手动设置。
#
# ========================================

# 上游版本选择 (⚠️ 由workflow自动覆盖)
# 选项: immortalwrt | openwrt| istoreos

# ========================================
# LuCI 插件选择 (y = 启用, #y = 禁用)
# 注意：插件越多，编译时间越长，占用空间越大
# ========================================

# --- 基础服务 (必需) ---
CONFIG_PACKAGE_luci-app-uhttpd=y
CONFIG_PACKAGE_luci-app-ucode=y
CONFIG_PACKAGE_luci-app-firewall=y

# --- 代理插件 (按需启用) ---
#CONFIG_PACKAGE_luci-app-openclash=y
# CONFIG_PACKAGE_luci-app-passwall=y

# --- 管理工具 (按需启用) ---
#CONFIG_PACKAGE_luci-app-ttyd=y
# CONFIG_PACKAGE_luci-app-diskman=y
# CONFIG_PACKAGE_luci-app-filebrowser=y

# ========================================
# 其他插件 (按需启用) ---
