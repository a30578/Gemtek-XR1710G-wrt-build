#!/bin/bash
# ========================================
# Gemtek XR1710G 固件编译 - 插件配置
# ========================================
#
# ⚠️  重要说明：
#    UPSTREAM 由 workflow 根据选择自动覆盖。
#    XR1710K 使用 SPI-NAND (4GB)，固件分区自动计算，无需手动设置。
#
# ========================================

# 上游版本选择 (⚠️ 由workflow自动覆盖)
# 选项: immortalwrt | openwrt
UPSTREAM="immortalwrt"

# ========================================
# LuCI 插件选择 (y = 启用, #y = 禁用)
# 注意：插件越多，编译时间越长，占用空间越大
# ========================================

# --- 基础服务 (必需) ---
CONFIG_PACKAGE_luci-app-uhttpd=y
CONFIG_PACKAGE_luci-app-ucode=y
CONFIG_PACKAGE_luci-app-firewall=y

# --- 代理插件 (按需启用) ---
CONFIG_PACKAGE_luci-app-openclash=y        # ⚠️ 较大，编译慢
# CONFIG_PACKAGE_luci-app-passwall=y       # PassWall

# --- 管理工具 (按需启用) ---
CONFIG_PACKAGE_luci-app-ttyd=y             # Web终端
# CONFIG_PACKAGE_luci-app-diskman=y        # 磁盘管理
# CONFIG_PACKAGE_luci-app-filebrowser=y    # 文件管理

# ========================================
# 其他插件 (按需启用) ---
# ========================================

# --- 广告拦截 ---
# CONFIG_PACKAGE_luci-app-adguardhome=y    # ⚠️ 较大
# CONFIG_PACKAGE_luci-app-adblock=y

# --- 下载工具 ---
# CONFIG_PACKAGE_luci-app-qbittorrent=y
# CONFIG_PACKAGE_luci-app-transmission=y
# CONFIG_PACKAGE_luci-app-aria2=y

# --- 系统工具 ---
CONFIG_PACKAGE_luci-app-autoreboot=y
# CONFIG_PACKAGE_luci-app-nlbwmon=y

# --- VPN ---
# CONFIG_PACKAGE_luci-app-wireguard=y

# --- 其他 ---
# CONFIG_PACKAGE_luci-app-eqos=y           # QoS
# CONFIG_PACKAGE_luci-app-docker=y         # Docker (需要较大内存)